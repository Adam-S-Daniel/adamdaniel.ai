<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Daniel — Freelance AI Engineer</title>
  <meta name="description" content="Adam Daniel — Freelance AI Engineer. adamdaniel.ai">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --muted: #555;
      --accent: #c8ff00;
      --link: #e8e8e8;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      opacity: 0.18;
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      text-align: left;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--fg);
    }

    .domain {
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 0.55rem;
      font-weight: 400;
    }

    .role {
      font-size: clamp(0.75rem, 1.8vw, 0.9rem);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.3rem;
      font-weight: 400;
    }

    .divider {
      width: 1.5rem;
      height: 1px;
      background: var(--accent);
      margin: 1.6rem 0;
      opacity: 0.7;
    }

    .linkedin {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--link);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--muted);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .linkedin:hover,
    .linkedin:focus-visible {
      color: var(--accent);
      border-color: var(--accent);
      outline: none;
    }

    .linkedin:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
      border-radius: 2px;
    }

    .linkedin svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Subtle cursor dot */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
      opacity: 0.8;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

<canvas id="c" aria-hidden="true"></canvas>

<main>
  <h1 class="name">Adam Daniel<span class="cursor" aria-hidden="true"></span></h1>
  <p class="domain">adamdaniel.ai</p>
  <p class="role">Freelance AI Engineer</p>
  <div class="divider" aria-hidden="true"></div>
  <a
    class="linkedin"
    href="https://www.linkedin.com/in/adam-s-daniel"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Adam Daniel on LinkedIn"
  >
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
    </svg>
    LinkedIn
  </a>
</main>

<script>
  // Organic particle field — very subtle, barely-there
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H, pts;

  const COUNT = 55;
  const SPEED = 0.18;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function init() {
    resize();
    pts = Array.from({ length: COUNT }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * SPEED,
      vy: (Math.random() - 0.5) * SPEED,
      r: Math.random() * 1.2 + 0.3,
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Connect nearby points
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x;
        const dy = pts[i].y - pts[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 120) {
          ctx.strokeStyle = `rgba(200,255,0,${(1 - d / 120) * 0.25})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.stroke();
        }
      }
    }

    // Draw points
    for (const p of pts) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,255,0,0.55)';
      ctx.fill();

      p.x += p.vx;
      p.y += p.vy;

      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); });
  init();
  draw();
</script>

</body>
</html>
