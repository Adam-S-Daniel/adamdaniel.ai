<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Daniel — Freelance AI Engineer</title>
  <meta name="description" content="Adam Daniel — Freelance AI Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: #04070f;
      color: #d8dde8;
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Aurora band 1 — teal/green, slow lateral drift */
    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: -20%;
      width: 140%;
      height: 50%;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(0,200,140,0.22) 40%,
        rgba(0,130,200,0.20) 70%,
        transparent
      );
      filter: blur(25px);
      animation: aurora-a 28s ease-in-out infinite alternate;
      pointer-events: none;
    }

    /* Aurora band 2 — purple/blue, different rhythm */
    body::after {
      content: '';
      position: fixed;
      top: -5%;
      left: -40%;
      width: 160%;
      height: 45%;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(100,50,220,0.18) 30%,
        rgba(0,170,220,0.20) 65%,
        transparent
      );
      filter: blur(30px);
      animation: aurora-b 36s ease-in-out infinite alternate-reverse;
      pointer-events: none;
    }

    @keyframes aurora-a {
      0%   { transform: translateX(0)   skewX(-2deg); opacity: 0.6; }
      50%  { transform: translateX(8%)  skewX(1deg);  opacity: 1; }
      100% { transform: translateX(-5%) skewX(-1deg); opacity: 0.7; }
    }

    @keyframes aurora-b {
      0%   { transform: translateX(0)    skewX(1deg);  opacity: 0.5; }
      50%  { transform: translateX(-10%) skewX(-2deg); opacity: 0.9; }
      100% { transform: translateX(6%)   skewX(1deg);  opacity: 0.6; }
    }

    main {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2.4rem, 6.5vw, 5.2rem);
      font-weight: 200;
      letter-spacing: 0.08em;
      line-height: 1;
      color: #e8edf5;
    }

    .domain {
      font-size: 0.7rem;
      color: #3a5070;
      letter-spacing: 0.3em;
      text-transform: lowercase;
      margin-top: 1.6rem;
    }

    .role {
      font-size: 0.65rem;
      color: #3a5070;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.35rem;
    }

    a.linkedin {
      display: inline-block;
      margin-top: 2.2rem;
      color: #3a5070;
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    a.linkedin:hover, a.linkedin:focus-visible { color: #80b0d0; }
    a.linkedin:focus-visible { outline: 1px solid #80b0d0; outline-offset: 4px; border-radius: 1px; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
    }

    footer nav {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    footer nav a {
      color: #151e2a;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    footer nav a:hover, footer nav a:focus-visible { color: #3a5070; }
    footer nav a:focus-visible { outline: 1px solid #3a5070; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <h1 class="name">Adam Daniel</h1>
    <p class="domain">adamdaniel.ai</p>
    <p class="role">Freelance AI Engineer</p>
    <a class="linkedin" href="https://www.linkedin.com/in/adam-s-daniel" target="_blank" rel="noopener noreferrer" aria-label="Adam Daniel on LinkedIn">LinkedIn</a>
  </main>

  <footer>
    <nav aria-label="Design variations">
      <a href="v1-thermal.html">Thermal</a>
      <a href="v2-grid.html">Grid</a>
      <a href="v3-shadow.html">Orbit</a>
      <a href="v4-scan.html">Scan</a>
      <a href="v5-interference.html">Interference</a>
      <a href="v6-halftone.html">Halftone</a>
      <a href="v7-aurora.html">Aurora</a>
      <a href="v8-breathe.html">Breathe</a>
      <a href="v9-conic.html">Conic</a>
      <a href="v10-fog.html">Fog</a>
    </nav>
  </footer>
</body>
</html>
