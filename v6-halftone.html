<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Daniel — Freelance AI Engineer</title>
  <meta name="description" content="Adam Daniel — Freelance AI Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: #f2f0eb;
      color: #1a1916;
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      padding: 8vw;
      overflow: hidden;
    }

    /*
      Halftone: repeating radial gradients forming dots.
      background-size animation slowly swells the dots.
    */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(26,25,22,0.12) 1.5px, transparent 1.5px);
      background-size: 18px 18px;
      animation: halftone-swell 6s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes halftone-swell {
      0%   { background-image: radial-gradient(circle, rgba(26,25,22,0.08) 1px, transparent 1px); }
      100% { background-image: radial-gradient(circle, rgba(26,25,22,0.15) 2.5px, transparent 2.5px); }
    }

    main {
      position: relative;
      text-align: right;
    }

    .name {
      font-size: clamp(2rem, 5.5vw, 4.2rem);
      font-weight: 400;
      letter-spacing: 0.01em;
      line-height: 1.05;
      color: #1a1916;
      font-style: italic;
    }

    .rule {
      width: 3rem;
      height: 2px;
      background: #1a1916;
      margin: 1.4rem 0 1.4rem auto;
      opacity: 0.25;
    }

    .domain {
      font-size: 0.7rem;
      color: #9a9890;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      font-style: normal;
      font-family: 'Helvetica Neue', sans-serif;
    }

    .role {
      font-size: 0.68rem;
      color: #9a9890;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-style: normal;
      font-family: 'Helvetica Neue', sans-serif;
      margin-top: 0.3rem;
    }

    a.linkedin {
      display: inline-block;
      margin-top: 1.8rem;
      color: #9a9890;
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', sans-serif;
      border-bottom: 1px solid #ccc;
      padding-bottom: 2px;
      transition: color 0.25s, border-color 0.25s;
    }

    a.linkedin:hover, a.linkedin:focus-visible {
      color: #1a1916;
      border-color: #1a1916;
    }

    a.linkedin:focus-visible { outline: 1px solid #1a1916; outline-offset: 4px; border-radius: 1px; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
    }

    footer nav {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    footer nav a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', sans-serif;
      transition: color 0.2s;
    }

    footer nav a:hover, footer nav a:focus-visible { color: #9a9890; }
    footer nav a:focus-visible { outline: 1px solid #9a9890; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <h1 class="name">Adam Daniel</h1>
    <div class="rule" aria-hidden="true"></div>
    <p class="domain">adamdaniel.ai</p>
    <p class="role">Freelance AI Engineer</p>
    <a class="linkedin" href="https://www.linkedin.com/in/adam-s-daniel" target="_blank" rel="noopener noreferrer" aria-label="Adam Daniel on LinkedIn">LinkedIn</a>
  </main>

  <footer>
    <nav aria-label="Design variations">
      <a href="v1-thermal.html">Thermal</a>
      <a href="v2-grid.html">Grid</a>
      <a href="v3-shadow.html">Orbit</a>
      <a href="v4-scan.html">Scan</a>
      <a href="v5-interference.html">Interference</a>
      <a href="v6-halftone.html">Halftone</a>
      <a href="v7-aurora.html">Aurora</a>
      <a href="v8-breathe.html">Breathe</a>
      <a href="v9-conic.html">Conic</a>
      <a href="v10-fog.html">Fog</a>
    </nav>
  </footer>
</body>
</html>
