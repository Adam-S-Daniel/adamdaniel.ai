<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Daniel — Freelance AI Engineer</title>
  <meta name="description" content="Adam Daniel — Freelance AI Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: #080808;
      color: #e8e8e8;
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /*
      Two stripe layers moving at different speeds in opposite directions.
      Their overlap creates a slowly shifting interference / moiré pattern.
    */
    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: -100%;
      pointer-events: none;
    }

    body::before {
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.025) 3px,
        rgba(255,255,255,0.025) 6px
      );
      animation: drift-a 14s linear infinite;
    }

    body::after {
      background: repeating-linear-gradient(
        0.8deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.022) 3px,
        rgba(255,255,255,0.022) 6px
      );
      animation: drift-b 19s linear infinite reverse;
    }

    @keyframes drift-a {
      from { transform: translateY(0); }
      to   { transform: translateY(200px); }
    }

    @keyframes drift-b {
      from { transform: translateY(0) rotate(0.3deg); }
      to   { transform: translateY(200px) rotate(0.3deg); }
    }

    main {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2.2rem, 6.5vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 1;
      color: #e8e8e8;
    }

    .name strong {
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .sep {
      width: 2rem;
      height: 1px;
      background: #333;
      margin: 1.8rem auto;
    }

    .domain {
      font-size: 0.72rem;
      color: #555;
      letter-spacing: 0.25em;
      text-transform: lowercase;
    }

    .role {
      font-size: 0.68rem;
      color: #444;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    a.linkedin {
      display: inline-block;
      margin-top: 2rem;
      color: #555;
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.25s;
    }

    a.linkedin:hover, a.linkedin:focus-visible { color: #e8e8e8; }
    a.linkedin:focus-visible { outline: 1px solid #888; outline-offset: 4px; border-radius: 1px; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
    }

    footer nav {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    footer nav a {
      color: #2a2a2a;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    footer nav a:hover, footer nav a:focus-visible { color: #888; }
    footer nav a:focus-visible { outline: 1px solid #888; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <h1 class="name"><strong>Adam</strong> Daniel</h1>
    <div class="sep" aria-hidden="true"></div>

    <p class="role">Freelance AI Engineer</p>
    <a class="linkedin" href="https://www.linkedin.com/in/adam-s-daniel" target="_blank" rel="noopener noreferrer" aria-label="Adam Daniel on LinkedIn">LinkedIn</a>
  </main>

  <footer>

      <a href="v3-shadow.html">Orbit</a>

      <a href="v7-aurora.html">Aurora</a>
      <a href="v8-breathe.html">Breathe</a>
      <a href="v9-conic.html">Conic</a>
      <a href="v10-fog.html">Fog</a>
    </nav>
  </footer>
</body>
</html>
