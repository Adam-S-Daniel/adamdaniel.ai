<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Daniel — Freelance AI Engineer</title>
  <meta name="description" content="Adam Daniel — Freelance AI Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: #f8f8f6;
      color: #111;
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main { text-align: center; }

    /*
      Only one thing moves: the name itself slowly expands and contracts.
      transform: scaleX() is composited and reliable across all browsers.
    */
    .name {
      font-size: clamp(2rem, 5.5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #111;
      display: inline-block;
      animation: breathe 6s ease-in-out infinite alternate;
      transform-origin: center;
    }

    @keyframes breathe {
      0%   { transform: scaleX(0.82); }
      100% { transform: scaleX(1.10); }
    }

    .domain {
      font-size: 0.7rem;
      color: #bbb;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      margin-top: 1.4rem;
    }

    .role {
      font-size: 0.65rem;
      color: #bbb;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 0.35rem;
    }

    a.linkedin {
      display: inline-block;
      margin-top: 2.2rem;
      color: #bbb;
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.25s;
    }

    a.linkedin:hover, a.linkedin:focus-visible { color: #111; }
    a.linkedin:focus-visible { outline: 1px solid #111; outline-offset: 4px; border-radius: 1px; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
    }

    footer nav {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    footer nav a {
      color: #ddd;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    footer nav a:hover, footer nav a:focus-visible { color: #999; }
    footer nav a:focus-visible { outline: 1px solid #999; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <h1 class="name">Adam Daniel</h1>

    <p class="role">Freelance AI Engineer</p>
    <a class="linkedin" href="https://www.linkedin.com/in/adam-s-daniel" target="_blank" rel="noopener noreferrer" aria-label="Adam Daniel on LinkedIn">LinkedIn</a>
  </main>

  <footer>
    <nav aria-label="Design variations">
      <a href="v1-thermal.html">Thermal</a>
      <a href="v2-grid.html">Grid</a>
      <a href="v3-shadow.html">Orbit</a>
      <a href="v4-scan.html">Scan</a>
      <a href="v5-interference.html">Interference</a>
      <a href="v6-halftone.html">Halftone</a>
      <a href="v7-aurora.html">Aurora</a>
      <a href="v8-breathe.html">Breathe</a>
      <a href="v9-conic.html">Conic</a>
      <a href="v10-fog.html">Fog</a>
    </nav>
  </footer>
</body>
</html>
