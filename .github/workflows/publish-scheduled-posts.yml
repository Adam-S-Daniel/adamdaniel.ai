name: Publish Scheduled Posts

# Runs every hour to check whether any post's publish_date has arrived.
# When posts are published, the resulting push to main triggers the
# normal Deploy to Production workflow automatically.
on:
  schedule:
    - cron: '0 * * * *'   # top of every hour (UTC)
  workflow_dispatch:        # allow manual runs from the Actions UI

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN; the push below will trigger
          # deploy-production.yml via the standard push event.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check and publish due posts
        id: check
        run: python3 scripts/publish_scheduled_posts.py

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git commit -m "chore: auto-publish ${{ steps.check.outputs.count }} scheduled post(s)"
          git push origin main
