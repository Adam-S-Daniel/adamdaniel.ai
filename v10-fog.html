<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Daniel — Freelance AI Engineer</title>
  <meta name="description" content="Adam Daniel — Freelance AI Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: #07080a;
      color: #cdd0d8;
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /*
      Fog: large, soft, blurred blobs that drift slowly.
      No JS — just CSS transforms on pseudo-elements + extra divs.
    */
    .fog {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .fog span {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0;
    }

    .fog span:nth-child(1) {
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, rgba(50,80,130,0.18), transparent 70%);
      top: -10%;
      left: -5%;
      animation: drift-1 35s ease-in-out infinite alternate;
    }

    .fog span:nth-child(2) {
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(30,100,90,0.14), transparent 70%);
      bottom: -5%;
      right: -8%;
      animation: drift-2 28s ease-in-out infinite alternate-reverse;
    }

    .fog span:nth-child(3) {
      width: 35vw;
      height: 35vw;
      background: radial-gradient(circle, rgba(80,50,120,0.12), transparent 70%);
      top: 30%;
      left: 40%;
      animation: drift-3 42s ease-in-out infinite alternate;
    }

    @keyframes drift-1 {
      0%   { transform: translate(0, 0);        opacity: 0.5; }
      50%  { transform: translate(8%, 6%);      opacity: 1; }
      100% { transform: translate(-4%, 10%);    opacity: 0.6; }
    }

    @keyframes drift-2 {
      0%   { transform: translate(0, 0);        opacity: 0.4; }
      50%  { transform: translate(-10%, -8%);   opacity: 0.9; }
      100% { transform: translate(6%, -12%);    opacity: 0.7; }
    }

    @keyframes drift-3 {
      0%   { transform: translate(0, 0);        opacity: 0.3; }
      50%  { transform: translate(-8%, 10%);    opacity: 0.7; }
      100% { transform: translate(12%, 4%);     opacity: 0.5; }
    }

    main {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2.2rem, 6vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #dde0e8;
    }

    .domain {
      font-size: 0.7rem;
      color: #384050;
      letter-spacing: 0.28em;
      text-transform: lowercase;
      margin-top: 1.5rem;
    }

    .role {
      font-size: 0.65rem;
      color: #384050;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.35rem;
    }

    a.linkedin {
      display: inline-block;
      margin-top: 2.2rem;
      color: #384050;
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    a.linkedin:hover, a.linkedin:focus-visible { color: #8090b0; }
    a.linkedin:focus-visible { outline: 1px solid #8090b0; outline-offset: 4px; border-radius: 1px; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      z-index: 1;
    }

    footer nav {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    footer nav a {
      color: #181c22;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    footer nav a:hover, footer nav a:focus-visible { color: #384050; }
    footer nav a:focus-visible { outline: 1px solid #384050; outline-offset: 3px; }
  </style>
</head>

  </div>
