<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Daniel — Freelance AI Engineer</title>
  <meta name="description" content="Adam Daniel — Freelance AI Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      color: #e0ddd8;
      font-family: 'Garamond', 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: thermal 40s ease-in-out infinite alternate;
    }

    /* The background shifts noticeably between warm and cool */
    @keyframes thermal {
      0%   { background-color: #150a02; }
      50%  { background-color: #0d0d0d; }
      100% { background-color: #02060f; }
    }

    /* Radial warmth that clearly breathes — amber glow, visible but gentle */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 55% 45% at 50% 50%, rgba(255,130,40,0.18), transparent 70%);
      animation: warmth 12s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes warmth {
      0%   { opacity: 0.1; transform: scale(0.7); }
      100% { opacity: 1;   transform: scale(1.4); }
    }

    main {
      position: relative;
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2.4rem, 7vw, 5rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1;
      color: #ede8e0;
    }

    .domain {
      font-size: clamp(0.75rem, 1.8vw, 0.9rem);
      color: #6b6560;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      margin-top: 1.2rem;
    }

    .role {
      font-size: clamp(0.7rem, 1.6vw, 0.8rem);
      color: #6b6560;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.4rem;
      font-style: italic;
    }

    .link-wrap {
      margin-top: 2.5rem;
    }

    a.linkedin {
      color: #a09890;
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: 'SF Mono', 'Fira Code', monospace;
      border-bottom: 1px solid #3a3530;
      padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
    }

    a.linkedin:hover, a.linkedin:focus-visible {
      color: #e0c090;
      border-color: #e0c090;
    }

    a.linkedin:focus-visible { outline: 2px solid #e0c090; outline-offset: 4px; border-radius: 1px; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
    }

    footer nav {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    footer nav a {
      color: #3a3530;
      text-decoration: none;
      font-family: 'SF Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    footer nav a:hover, footer nav a:focus-visible { color: #a09890; }
    footer nav a:focus-visible { outline: 1px solid #a09890; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <h1 class="name">Adam Daniel</h1>
    <p class="domain">adamdaniel.ai</p>
    <p class="role">Freelance AI Engineer</p>
    <div class="link-wrap">
      <a class="linkedin" href="https://www.linkedin.com/in/adam-s-daniel" target="_blank" rel="noopener noreferrer" aria-label="Adam Daniel on LinkedIn">LinkedIn</a>
    </div>
  </main>

  <footer>
    <nav aria-label="Design variations">
      <a href="v1-thermal.html">Thermal</a>
      <a href="v2-grid.html">Grid</a>
      <a href="v3-shadow.html">Orbit</a>
      <a href="v4-scan.html">Scan</a>
      <a href="v5-interference.html">Interference</a>
      <a href="v6-halftone.html">Halftone</a>
      <a href="v7-aurora.html">Aurora</a>
      <a href="v8-breathe.html">Breathe</a>
      <a href="v9-conic.html">Conic</a>
      <a href="v10-fog.html">Fog</a>
    </nav>
  </footer>
</body>
</html>
