<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Daniel — Freelance AI Engineer</title>
  <meta name="description" content="Adam Daniel — Freelance AI Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background-color: #09090f;
      color: #dde0ee;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 8vw;
    }

    /*
      Dot grid breathes via opacity — the most reliable
      cross-browser animation for background patterns.
    */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(160,170,220,0.5) 1px, transparent 1px);
      background-size: 28px 28px;
      animation: grid-breathe 4s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes grid-breathe {
      0%   { opacity: 0.08; }
      100% { opacity: 0.55; }
    }

    main { position: relative; }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #4a5080;
      margin-bottom: 1.4rem;
    }

    .name {
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #dde0ee;
    }

    .domain {
      font-size: clamp(0.7rem, 1.6vw, 0.82rem);
      color: #4a5080;
      letter-spacing: 0.12em;
      margin-top: 0.9rem;
    }

    .role {
      font-size: clamp(0.68rem, 1.5vw, 0.78rem);
      color: #4a5080;
      letter-spacing: 0.12em;
      margin-top: 0.25rem;
    }

    a.linkedin {
      display: inline-block;
      margin-top: 2.2rem;
      color: #6a75b0;
      text-decoration: none;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.25s;
    }

    a.linkedin::before {
      content: '→ ';
      color: #4a5080;
    }

    a.linkedin:hover, a.linkedin:focus-visible { color: #a0b0ee; }
    a.linkedin:focus-visible { outline: 1px solid #a0b0ee; outline-offset: 4px; border-radius: 1px; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
    }

    footer nav {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    footer nav a {
      color: #2a2d45;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    footer nav a:hover, footer nav a:focus-visible { color: #6a75b0; }
    footer nav a:focus-visible { outline: 1px solid #6a75b0; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <h1 class="name">Adam<br>Daniel</h1>
    <p class="role">Freelance AI Engineer</p>
    <a class="linkedin" href="https://www.linkedin.com/in/adam-s-daniel" target="_blank" rel="noopener noreferrer" aria-label="Adam Daniel on LinkedIn">LinkedIn</a>
  </main>

  <footer>
    <nav aria-label="Design variations">
      <a href="v1-thermal.html">Thermal</a>
      <a href="v2-grid.html">Grid</a>
      <a href="v3-shadow.html">Orbit</a>
      <a href="v4-scan.html">Scan</a>
      <a href="v5-interference.html">Interference</a>
      <a href="v6-halftone.html">Halftone</a>
      <a href="v7-aurora.html">Aurora</a>
      <a href="v8-breathe.html">Breathe</a>
      <a href="v9-conic.html">Conic</a>
      <a href="v10-fog.html">Fog</a>
    </nav>
  </footer>
</body>
</html>
