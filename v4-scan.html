<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Daniel — Freelance AI Engineer</title>
  <meta name="description" content="Adam Daniel — Freelance AI Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: #030a03;
      color: #a8ffb8;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 10vw;
      overflow: hidden;
    }

    /* Scan line: a thin bright bar crawls top to bottom, then resets */
    body::after {
      content: '';
      position: fixed;
      top: -2px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(to bottom,
        transparent,
        rgba(168,255,184,0.55) 50%,
        transparent
      );
      animation: scan 9s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0%   { transform: translateY(0); opacity: 0; }
      3%   { opacity: 1; }
      97%  { opacity: 0.6; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    /* Very subtle horizontal CRT line texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
    }

    main { position: relative; }

    .prompt {
      font-size: 0.62rem;
      color: #2a6635;
      letter-spacing: 0.1em;
      margin-bottom: 1.6rem;
    }

    .name {
      font-size: clamp(1.6rem, 4.5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1;
      color: #a8ffb8;
    }

    .domain {
      font-size: 0.72rem;
      color: #2a6635;
      letter-spacing: 0.12em;
      margin-top: 1rem;
    }

    .role {
      font-size: 0.68rem;
      color: #2a6635;
      letter-spacing: 0.12em;
      margin-top: 0.3rem;
    }

    a.linkedin {
      display: block;
      margin-top: 2rem;
      color: #4a9960;
      text-decoration: none;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }

    a.linkedin::before { content: '> '; color: #2a6635; }

    a.linkedin:hover, a.linkedin:focus-visible { color: #a8ffb8; }
    a.linkedin:focus-visible { outline: 1px solid #a8ffb8; outline-offset: 4px; border-radius: 1px; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
    }

    footer nav {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    footer nav a {
      color: #1a3a22;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    footer nav a:hover, footer nav a:focus-visible { color: #4a9960; }
    footer nav a:focus-visible { outline: 1px solid #4a9960; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <h1 class="name">Adam Daniel</h1>
    <p class="role">Freelance AI Engineer</p>
    <a class="linkedin" href="https://www.linkedin.com/in/adam-s-daniel" target="_blank" rel="noopener noreferrer" aria-label="Adam Daniel on LinkedIn">linkedin.com/in/adam-s-daniel</a>
  </main>

  <footer>
    <nav aria-label="Design variations">

      <a href="v2-grid.html">Grid</a>
      <a href="v3-shadow.html">Orbit</a>
      <a href="v4-scan.html">Scan</a>
      <a href="v5-interference.html">Interference</a>
      <a href="v6-halftone.html">Halftone</a>
      <a href="v7-aurora.html">Aurora</a>
      <a href="v8-breathe.html">Breathe</a>
      <a href="v9-conic.html">Conic</a>
      <a href="v10-fog.html">Fog</a>
    </nav>
  </footer>
</body>
</html>
