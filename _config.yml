title: Adam Daniel
description: Freelance AI Engineer — building intelligent systems
url: "https://adamdaniel.ai"
baseurl: ""
author:
  name: Adam Daniel
  email: adam@adamdaniel.ai

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:slug/

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:slug/
  tags:
    output: true
    permalink: /tags/:slug/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "tags"
    values:
      layout: "tag"
  - scope:
      path: "pages"
    values:
      layout: "page"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - oauth-proxy
  - "*.sh"
  - vendor
